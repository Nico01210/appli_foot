services:
  - type: web
    name: appli-foot
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/data
    disk:
      name: appli-foot-data
      mountPath: /opt/render/project/data
      sizeGB: 1
